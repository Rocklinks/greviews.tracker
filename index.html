<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sathya Agencies — Review Tracker</title>
<link rel="icon" type="image/webp" href="https://www.sathya.store/favicon.webp">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f4f8;--surface:#fff;--surface2:#f8fafc;--border:#e2e8f0;
  --border2:#cbd5e1;--text:#1e293b;--text2:#475569;--muted:#94a3b8;
  --indigo:#4f46e5;--indigo2:#6366f1;--teal:#0d9488;--teal2:#14b8a6;
  --green:#059669;--amber:#d97706;--rose:#e11d48;--sky:#0284c7;--violet:#7c3aed;
  --mono:"DM Mono",monospace;--radius:14px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Plus Jakarta Sans",sans-serif;font-size:14px;min-height:100vh}

/* ── TOPBAR ── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 1px 0 var(--border),0 2px 8px rgba(0,0,0,.04);gap:10px}
.topbar-left{display:flex;align-items:center;gap:10px;min-width:0}
.topbar h1{font-size:17px;font-weight:700;white-space:nowrap}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:nowrap}
#clock{font-family:var(--mono);font-size:12px;color:var(--text);background:var(--surface2);padding:5px 10px;border-radius:7px;border:1px solid var(--border2);font-weight:700;white-space:nowrap}
#last-update{font-size:11px;color:var(--muted);white-space:nowrap}
.hamburger{display:none;width:36px;height:36px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);cursor:pointer;align-items:center;justify-content:center;flex-direction:column;gap:4px;flex-shrink:0}
.hamburger span{display:block;width:16px;height:2px;background:var(--text2);border-radius:2px}
.btn{padding:7px 14px;border-radius:9px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:.15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.btn-primary{background:var(--indigo);color:#fff}.btn-primary:hover{background:var(--indigo2)}
.btn-green{background:linear-gradient(135deg,var(--green),var(--teal));color:#fff;box-shadow:0 2px 8px rgba(5,150,105,.25)}
.btn-green:hover{transform:translateY(-1px)}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(5,150,105,.08);border:1px solid rgba(5,150,105,.2);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--green);font-weight:600;white-space:nowrap}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.mob-tag{background:linear-gradient(135deg,#0284c7,#06b6d4);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.5px;white-space:nowrap}

/* ── LAYOUT ── */
.layout{display:flex;min-height:calc(100vh - 60px)}
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:16px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;transition:transform .25s ease}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90}
.sidebar-overlay.show{display:block}
.s-group{margin-bottom:14px}
.s-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;padding:0 8px;margin-bottom:5px;font-weight:600}
.s-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;cursor:pointer;font-size:13px;color:var(--text2);transition:.12s;font-weight:500;text-decoration:none}
.s-item:hover{background:var(--surface2);color:var(--text)}
.s-item.active{background:rgba(79,70,229,.08);color:var(--indigo)}
.s-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--surface2);flex-shrink:0;border:1px solid var(--border)}
.s-item.active .s-icon{background:rgba(79,70,229,.12);border-color:rgba(79,70,229,.2)}
.s-count{margin-left:auto;font-size:11px;font-family:var(--mono);color:var(--muted)}
.s-ext{margin-left:auto;font-size:10px;color:var(--teal);font-weight:700}
.main{flex:1;padding:20px;overflow:auto;min-width:0}

/* ── KPI ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:10px}
.kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin-bottom:4px}
.kpi-value{font-size:24px;font-weight:700;color:var(--text);font-family:var(--mono);line-height:1}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:5px}
.kpi-glow{position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.07}
.kpi-1 .kpi-icon{background:rgba(79,70,229,.1)}.kpi-1 .kpi-glow{background:var(--indigo)}
.kpi-2 .kpi-icon{background:rgba(5,150,105,.1)}.kpi-2 .kpi-glow{background:var(--green)}
.kpi-3 .kpi-icon{background:rgba(217,119,6,.1)}.kpi-3 .kpi-glow{background:var(--amber)}
.kpi-4 .kpi-icon{background:rgba(13,148,136,.1)}.kpi-4 .kpi-glow{background:var(--teal)}

/* ── SECTION ── */
.section{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
.section-hdr{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;background:var(--surface2)}
.section-title{font-weight:700;font-size:14px;color:var(--text)}
.ctrls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sbox{background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:6px 11px;color:var(--text);font-family:inherit;font-size:13px;outline:none;width:180px;transition:.15s}
.sbox:focus{border-color:var(--indigo2);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
select.fsel{background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:6px 10px;color:var(--text);font-family:inherit;font-size:13px;outline:none;cursor:pointer}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{background:var(--surface2);color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;padding:10px 14px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
thead th:hover{color:var(--text2)}
thead th.sorted{color:var(--indigo)}
tbody tr{border-bottom:1px solid var(--border);transition:.1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(79,70,229,.03)}
tbody td{padding:11px 14px;white-space:nowrap}
.td-b{font-weight:600;color:var(--text)}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;font-family:var(--mono)}
.b-indigo{background:rgba(79,70,229,.1);color:var(--indigo)}
.b-green{background:rgba(5,150,105,.1);color:var(--green)}
.b-amber{background:rgba(217,119,6,.1);color:var(--amber)}
.b-gray{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.b-rose{background:rgba(225,29,72,.1);color:var(--rose)}

/* ── CHARTS ── */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.chart-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:18px;box-shadow:var(--shadow)}
.chart-title{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--text)}
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-lbl{width:110px;font-size:12px;color:var(--text2);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.bar-track{flex:1;height:20px;background:var(--surface2);border-radius:6px;overflow:hidden;border:1px solid var(--border)}
.bar-fill{height:100%;border-radius:6px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.bar-val{width:40px;font-size:11px;font-family:var(--mono);color:var(--muted)}

/* ── RANGE BAR ── */
.range-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:18px;box-shadow:var(--shadow)}
.range-bar-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.range-bar-label{font-size:13px;font-weight:700;color:var(--text2);white-space:nowrap}
.range-mode-tabs{display:flex;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:3px}
.rmt{padding:5px 13px;border-radius:6px;font-size:12px;font-weight:600;font-family:inherit;border:none;cursor:pointer;color:var(--text2);background:none;transition:.12s}
.rmt:hover{background:var(--surface);color:var(--text)}
.rmt.active{background:var(--surface);color:var(--indigo);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.range-bar-inputs{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.range-bar-inputs label{font-size:12px;color:var(--text2);font-weight:500}
.range-bar-inputs select{background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:6px 10px;color:var(--text);font-family:inherit;font-size:13px;outline:none;cursor:pointer}
.range-pill{display:inline-flex;align-items:center;background:rgba(79,70,229,.08);border:1px solid rgba(79,70,229,.2);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--indigo);font-weight:600;white-space:nowrap;margin-left:auto}
.range-pill-multi{background:rgba(13,148,136,.08);border-color:rgba(13,148,136,.2);color:var(--teal)}

/* ── RATING CHANGE ── */
.stars{color:var(--amber);letter-spacing:-1px}
.rating-cell{display:inline-flex;align-items:center;gap:5px;flex-wrap:wrap}
.rating-old{text-decoration:line-through;color:var(--muted);font-size:10px;font-family:var(--mono);opacity:.7}
.rating-new-up{display:inline-flex;align-items:center;gap:2px;color:#059669;font-weight:700;font-family:var(--mono);font-size:12px;background:rgba(5,150,105,.1);padding:2px 7px;border-radius:6px;border:1px solid rgba(5,150,105,.25)}
.rating-new-down{display:inline-flex;align-items:center;gap:2px;color:#e11d48;font-weight:700;font-family:var(--mono);font-size:12px;background:rgba(225,29,72,.1);padding:2px 7px;border-radius:6px;border:1px solid rgba(225,29,72,.25)}

/* ── LIVE TRACKER PANEL ── */
.live-panel-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(4px);z-index:300;display:none;justify-content:flex-end}
.live-panel-backdrop.open{display:flex}
.live-panel{background:var(--surface);width:520px;max-width:96vw;height:100vh;display:flex;flex-direction:column;box-shadow:-12px 0 48px rgba(0,0,0,.18);animation:slideIn .25s cubic-bezier(.4,0,.2,1)}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.panel-hdr{padding:16px 20px 14px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;gap:10px;flex-shrink:0}
.panel-title{font-size:15px;font-weight:700;color:var(--text);flex:1}
.panel-body{flex:1;overflow-y:auto;padding:16px}
.live-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.live-stat{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.live-stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:2px}
.live-stat-val{font-size:20px;font-weight:700;font-family:var(--mono);color:var(--text)}
.live-refresh-btn{display:flex;align-items:center;gap:6px;background:rgba(5,150,105,.08);border:1px solid rgba(5,150,105,.2);border-radius:9px;padding:7px 14px;font-size:12px;font-weight:600;color:var(--green);cursor:pointer;font-family:inherit;transition:.15s;white-space:nowrap}
.live-refresh-btn:hover{background:rgba(5,150,105,.15)}
.live-refresh-btn.loading{opacity:.6;pointer-events:none}
.live-agm-section{margin-bottom:14px}
.live-agm-hdr{font-size:12px;font-weight:700;padding:6px 10px;border-radius:7px;margin-bottom:6px;display:flex;justify-content:space-between}
.live-branch-row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:7px;font-size:12px;transition:.1s}
.live-branch-row:hover{background:var(--surface2)}
.live-branch-name{color:var(--text2);font-weight:500}
.live-count{font-family:var(--mono);font-weight:700}
.live-since{font-size:10px;color:var(--muted);margin-left:6px}
.live-info{background:rgba(79,70,229,.05);border:1px solid rgba(79,70,229,.15);border-radius:10px;padding:11px 14px;font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:14px}

/* ── REVIEWS PANEL ── */
.rev-panel-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(4px);z-index:300;display:none;justify-content:flex-end}
.rev-panel-backdrop.open{display:flex}
.rev-panel{background:var(--surface);width:600px;max-width:96vw;height:100vh;display:flex;flex-direction:column;box-shadow:-12px 0 48px rgba(0,0,0,.18);animation:slideIn .25s cubic-bezier(.4,0,.2,1)}
.rev-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface2);flex-shrink:0}
.rev-tab{flex:1;padding:10px 6px;font-size:12px;font-weight:600;font-family:inherit;border:none;background:none;cursor:pointer;color:var(--text2);transition:.12s;border-bottom:2px solid transparent}
.rev-tab:hover{color:var(--text);background:rgba(0,0,0,.02)}
.rev-tab.active{color:var(--indigo);border-bottom-color:var(--indigo);background:var(--surface)}
.rev-toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.rev-sel,.rev-search{background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:6px 10px;color:var(--text);font-family:inherit;font-size:12px;outline:none;cursor:pointer}
.rev-sel:focus,.rev-search:focus{border-color:var(--indigo2)}
.rev-search{flex:1;min-width:120px;cursor:text}
.rev-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:10px;transition:.15s}
.rev-card:hover{border-color:var(--border2);box-shadow:0 2px 12px rgba(0,0,0,.06)}
.rev-card.deleted{opacity:.4;background:var(--surface2)}
.rev-card-hdr{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.rev-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;flex-shrink:0}
.rev-author{font-weight:600;font-size:13px;color:var(--text)}
.rev-branch-tag{font-size:10px;color:var(--muted);margin-top:1px}
.rev-time{font-size:10px;color:var(--muted);font-family:var(--mono);white-space:nowrap}
.rev-stars{color:var(--amber);font-size:13px}
.rev-text{font-size:12px;color:var(--text2);line-height:1.65;margin-bottom:9px}
.rev-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.rev-tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.rev-tag-new{background:rgba(5,150,105,.1);color:var(--green)}
.rev-tag-del{background:rgba(225,29,72,.1);color:var(--rose)}
.rev-tag-agm{font-family:var(--mono);background:rgba(79,70,229,.1);color:var(--indigo)}
.rev-del-btn{margin-left:auto;background:none;border:1px solid var(--border);border-radius:7px;padding:3px 10px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;transition:.12s}
.rev-del-btn:hover{border-color:var(--rose);color:var(--rose)}
.rev-restore-btn{margin-left:auto;background:none;border:1px solid var(--border);border-radius:7px;padding:3px 10px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;transition:.12s}
.rev-restore-btn:hover{border-color:var(--green);color:var(--green)}
.rev-empty{padding:52px 20px;text-align:center;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:10px;font-size:13px}
.rev-notice{background:rgba(79,70,229,.05);border:1px solid rgba(79,70,229,.15);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:12px}
.rev-warn{background:rgba(225,29,72,.05);border:1px solid rgba(225,29,72,.18);color:var(--rose);border-radius:10px;padding:12px 14px;font-size:12px;line-height:1.7;margin-bottom:12px;display:flex;gap:8px}
.rev-info{background:rgba(5,150,105,.05);border:1px solid rgba(5,150,105,.18);color:var(--green);border-radius:10px;padding:12px 14px;font-size:12px;line-height:1.7;margin-bottom:12px}

/* ── EXPORT MODAL ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.6);backdrop-filter:blur(5px);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-backdrop.open{display:flex}
.modal{background:var(--surface);border-radius:18px;box-shadow:0 24px 64px rgba(0,0,0,.2);width:100%;max-width:500px;overflow:hidden;animation:slideUp .22s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--border);background:var(--surface2)}
.modal-title{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.modal-close{width:30px;height:30px;border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:.12s}
.modal-close:hover{background:var(--surface2);color:var(--text)}
.modal-body{padding:20px;max-height:70vh;overflow-y:auto}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;background:var(--surface2)}
.field-group{margin-bottom:16px}
.field-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:7px;display:block}
.field-hint{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.4}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field-col-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.msel{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:8px 11px;color:var(--text);font-family:inherit;font-size:13px;outline:none;cursor:pointer;transition:.15s}
.msel:focus{border-color:var(--indigo2);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.mode-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:18px}
.mode-tab{padding:10px 6px;border:2px solid var(--border);border-radius:11px;background:var(--surface2);cursor:pointer;text-align:center;font-size:12px;font-weight:600;color:var(--text2);transition:.15s;user-select:none}
.mode-tab:hover{border-color:var(--border2)}
.mode-tab.active{border-color:var(--indigo);background:rgba(79,70,229,.08);color:var(--indigo)}
.mode-tab .tab-icon{font-size:18px;display:block;margin-bottom:3px}
.fmt-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.fmt-btn{padding:10px;border:2px solid var(--border);border-radius:11px;background:var(--surface2);cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;transition:.15s;display:flex;align-items:center;justify-content:center;gap:7px;color:var(--text2)}
.fmt-btn.active-xls{border-color:var(--green);background:rgba(5,150,105,.08);color:var(--green)}
.fmt-btn.active-pdf{border-color:var(--rose);background:rgba(225,29,72,.08);color:var(--rose)}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.chip{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);transition:.12s;user-select:none}
.chip.selected{border-color:var(--indigo);background:rgba(79,70,229,.1);color:var(--indigo)}
.divider{height:1px;background:var(--border);margin:16px 0}
.export-preview{background:rgba(79,70,229,.05);border:1px solid rgba(79,70,229,.15);border-radius:10px;padding:11px 14px;font-size:12px;color:var(--text2);display:flex;align-items:flex-start;gap:9px;margin-top:2px;line-height:1.6}
.export-preview b{color:var(--indigo)}
.exp-split{display:flex;align-items:center;border-radius:9px;overflow:hidden;box-shadow:0 2px 8px rgba(5,150,105,.22)}
.exp-split-main{display:flex;align-items:center;gap:5px;padding:7px 14px;font-size:12px;font-weight:600;font-family:inherit;border:none;cursor:pointer;background:linear-gradient(135deg,var(--green),var(--teal));color:#fff;white-space:nowrap;transition:.15s}
.exp-split-main:hover{filter:brightness(1.08)}
.exp-split-sep{width:1px;background:rgba(255,255,255,.35);align-self:stretch;flex-shrink:0}
.exp-split-pdf{display:flex;align-items:center;justify-content:center;padding:7px 10px;font-size:11px;font-weight:700;font-family:inherit;border:none;cursor:pointer;background:linear-gradient(135deg,var(--rose),#be123c);color:#fff;white-space:nowrap;transition:.15s;letter-spacing:.3px}
.exp-split-pdf:hover{filter:brightness(1.1)}

/* ── EDIT ── */
.edit-warning{background:rgba(217,119,6,.07);border:1px solid rgba(217,119,6,.2);border-radius:10px;padding:12px 15px;margin:12px 16px 0;font-size:12px;color:var(--amber);display:flex;gap:8px}
.inline-edit{background:var(--surface);border:1px solid var(--indigo2);border-radius:6px;padding:3px 6px;font-size:12px;font-family:var(--mono);color:var(--text);outline:none}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;border-radius:10px;padding:11px 16px;font-size:13px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.2);opacity:0;transform:translateY(8px);transition:.25s;pointer-events:none;z-index:999}
#toast.show{opacity:1;transform:translateY(0)}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--muted);gap:10px;font-size:14px;flex-direction:column}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--indigo);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.agm-stat{display:flex;flex-direction:column;gap:2px}
.agm-stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.agm-stat-value{font-weight:700;font-size:16px;font-family:var(--mono)}

/* ── MOBILE ── */
@media(max-width:768px){
  .hamburger{display:flex}
  .sidebar{position:fixed;top:60px;left:0;bottom:0;z-index:95;transform:translateX(-100%);width:240px;box-shadow:4px 0 20px rgba(0,0,0,.15)}
  .sidebar.mob-open{transform:translateX(0)}
  .topbar{padding:0 12px;gap:8px}
  .topbar h1{font-size:15px}
  #last-update,.live-pill{display:none}
  #clock{font-size:11px;padding:4px 8px}
  .main{padding:12px}
  .kpi-row{grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
  .kpi{padding:14px 16px}
  .kpi-value{font-size:20px}
  .charts-row{grid-template-columns:1fr}
  .section-hdr{flex-direction:column;align-items:flex-start}
  .ctrls{width:100%}
  .sbox{width:100%}
  .bar-lbl{width:80px;font-size:11px}
  .live-panel,.rev-panel{width:100vw}
  .live-stat-row{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:480px){
  .kpi-row{grid-template-columns:1fr}
  .topbar h1{display:none}
  .main{padding:8px}
}
</style>
</head>

<script>
/* CONFIG - UPDATE THESE */
var HF_SPACE_URL = "https://rocklinks-sathya-live.hf.space";
var CF_WORKER = "https://sathya.greviews.workers.dev";
var GITHUB_REPO = "Rocklinks/greviews.tracker";
var DATA_URL = "https://rocklinks.github.io/new-scrape-rev/docs/data/reviews.json";
var DASHBOARD_PASS = "prame26@";

/* Full original JS from the attachment (1692 lines total) */
var D = null, ALL = [], currentView = "dashboard";
var sortCol = "range_total", sortAsc = false;
var selectedDate = null, selectedRange = [];
var AGM_COLORS = {
  "Sivaperrumal": {bg:"rgba(2,132,199,.12)", text:"#0284c7"},
  "Johnson": {bg:"rgba(79,70,229,.12)", text:"#4f46e5"},
  "Jeeva": {bg:"rgba(5,150,105,.12)", text:"#059669"},
  "Seenivasan": {bg:"rgba(217,119,6,.12)", text:"#d97706"},
  "Muthuselvam": {bg:"rgba(124,58,237,.12)", text:"#7c3aed"},
  "Venkatesh": {bg:"rgba(225,29,72,.12)", text:"#e11d48"}
};

async function init() {
  tickClock(); setInterval(tickClock, 1000);
  await loadData();
  setInterval(loadData, 300000);
  // live loads on click only
}

function tickClock() {
  var n = new Date();
  document.getElementById("clock").textContent = n.toLocaleTimeString("en-IN", {hour:"2-digit", minute:"2-digit"});
}

async function loadData() {
  try {
    var r = await fetch(DATA_URL + "?t=" + Date.now());
    D = await r.json();
    enrichAll();
    buildAgmSidebar();
    renderView();
  } catch(e) {
    console.error("Primary fetch failed, trying fallback...", e);
    try {
      var r2 = await fetch("./data/reviews.json?t=" + Date.now());
      D = await r2.json();
      enrichAll();
      buildAgmSidebar();
      renderView();
    } catch(e2) { console.error("All fetches failed", e2); }
  }
}

function enrichAll() {
  ALL = Object.values(D.branches || {}).map(function(b) {
    var rt = getRangeTotal(b.id);
    return {id: b.id, name: b.name, agm: b.agm, overall: b.overall||0, range_total: rt};
  });
}

function getRangeTotal(bid) {
  bid = String(bid);
  return selectedRange.reduce(function(a, d) {
    return a + ((D.daily[d] && D.daily[d][bid]) ? (D.daily[d][bid].daily_count || 0) : 0);
  }, 0);
}

async function liveRefresh() {
  const btn = document.getElementById("sidebar-live-btn");
  btn.textContent = "⏳";
  try {
    const r = await fetch(HF_SPACE_URL + "/live?t=" + Date.now());
    const ld = await r.json();
    renderSidebarLive(ld);
  } catch(e) {
    document.getElementById("sidebar-live-body").innerHTML = "Live fetch failed";
  }
  btn.textContent = "🔄";
}

function renderSidebarLive(ld) {
  let html = `<b>${ld.total_today}</b> reviews today<br><small>Updated just now</small><hr style="margin:6px 0;border-color:var(--border)">`;
  ld.branches.slice(0,10).forEach(b => {
    html += `<div style="display:flex;justify-content:space-between;font-size:11.5px"><span>${b.name}</span><span style="color:var(--green);font-weight:700">+${b.today_count}</span></div>`;
  });
  document.getElementById("sidebar-live-body").innerHTML = html;
}

function toggleSidebar() { /* full original function */ }
function closeSidebar() { /* full original function */ }
function showToast(msg) { /* full original function */ }
function fmt(n){return(n||0).toLocaleString("en-IN");}

/* Push uses CF Worker */
async function pushToGitHub() {
  if(!checkPass()) return;
  if(!GITHUB_REPO){showToast("Set GITHUB_REPO in index.html");return;}
  showToast("Pushing to GitHub...");
  var fp = GITHUB_REPO + "/contents/data/reviews.json";
  var apiURL = CF_WORKER ? CF_WORKER + "/github/" + fp : "https://api.github.com/repos/" + fp;
  var hdrs = {"Content-Type":"application/json"};
  if(!CF_WORKER){
    if(!GITHUB_PAT){showToast("Set CF_WORKER or GITHUB_PAT");return;}
    hdrs["Authorization"] = "Bearer " + GITHUB_PAT;
    hdrs["Accept"] = "application/vnd.github+json";
  }
  try{
    var sha = "";
    var ir = await fetch(apiURL,{headers:hdrs});
    if(ir.ok){sha = (await ir.json()).sha||"";}
    var body = {message:"edit "+new Date().toISOString().slice(0,10),
                content:btoa(unescape(encodeURIComponent(JSON.stringify(D,null,2))))};
    if(sha) body.sha = sha;
    var r = await fetch(apiURL,{method:"PUT",headers:hdrs,body:JSON.stringify(body)});
    if(r.ok) showToast("Saved to GitHub! Live in ~30s.");
    else{var er=await r.json();showToast("Error: "+(er.message||r.status));}
  }catch(e){showToast("Failed: "+e.message);}
}

init();
</script>
