name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - name: Create Cloudflare Pages project (if needed)
        run: npx wrangler pages project create sathya-reviews --production-branch=main --account-id=${{ secrets.SATHYA }} || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFARE }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFARE }}
          accountId: ${{ secrets.SATHYA }}
          command: pages deploy . --project-name=sathya-reviews
